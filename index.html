<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Registration Count </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- SHARED THEME VARIABLES --- */
        :root {
            --bg-gradient-1: #1a1c2c;
            --bg-gradient-2: #4a192c;
            --bg-gradient-3: #0f2027;
            --bg-gradient-4: #2c5364;
            --glass-bg: rgba(30, 30, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --input-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.25);
            --success-color: #4ade80;
            --error-color: #ef4444;
            --card-bg: rgba(255, 255, 255, 0.03);
            --select-bg: #1e293b;
        }

        [data-theme="light"] {
            --bg-gradient-1: #8EC5FC;
            --bg-gradient-2: #E0C3FC;
            --bg-gradient-3: #ffffff;
            --bg-gradient-4: #D9AFD9;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --input-border: #94a3b8;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(255, 255, 255, 0.4);
            --select-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3), var(--bg-gradient-4));
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
            transition: color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 550px;
            animation: fadeIn 0.6s ease-out;
            position: relative;
            z-index: 1;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow-color);
            border-radius: 24px;
        }

        /* Header */
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .header p { font-size: 1rem; color: var(--text-secondary); }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed; top: 1.5rem; right: 1.5rem;
            width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: transform 0.2s;
        }
        .theme-toggle:hover { transform: scale(1.1); }

        /* Form Layout */
        .form-card { padding: 2.5rem 2rem; }

        /* --- FLOATING INPUT FIELDS --- */
        .input-box { position: relative; margin-bottom: 35px; margin-top: 10px; }
        .input-box i { position: absolute; left: 0; top: 12px; color: var(--text-secondary); font-size: 1.2rem; transition: 0.3s; }
        
        .input-box input, .input-box select {
            width: 100%; padding: 10px 10px 10px 35px; background: transparent; border: none; outline: none;
            border-bottom: 2px solid var(--input-border); color: var(--text-primary); font-size: 1rem; letter-spacing: 0.5px; transition: 0.5s;
            border-radius: 0; box-shadow: none; font-family: 'Inter', sans-serif;
        }

        .input-box select { cursor: pointer; appearance: none; -webkit-appearance: none; }
        .input-box select option { background: var(--select-bg); color: var(--text-primary); }
        
        .input-box label {
            position: absolute; left: 35px; top: 10px; color: var(--text-secondary);
            pointer-events: none; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); font-size: 1rem; font-weight: 500;
        }

        /* Floating Label Logic */
        .input-box input:focus ~ label, 
        .input-box input:not(:placeholder-shown) ~ label, 
        .input-box select:focus ~ label, 
        .input-box select:valid ~ label {
            top: -22px; left: 0; color: var(--success-color); font-size: 0.85rem; font-weight: 600;
        }
        
        .input-box input:focus, .input-box select:focus { border-bottom: 2px solid var(--success-color); }
        .input-box input:focus ~ i, .input-box select:focus ~ i { color: var(--success-color); }

        /* Dynamic Member Boxes */
        .team-member-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
            border-radius: 16px;
            animation: fadeIn 0.4s forwards ease-out;
            opacity: 0;
            transition: 0.3s;
        }

        .team-member-box h4 {
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Submit Button */
        button[type="submit"] {
            width: 100%; padding: 14px; 
            background: var(--text-primary); 
            color: var(--bg-gradient-1); 
            border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px var(--shadow-color);
            display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 1rem;
        }
        button[type="submit"]:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px var(--shadow-color); 
            opacity: 0.9;
        }
        button[type="submit"]:active { transform: translateY(1px); }
        button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Responsive */
        @media (max-width: 500px) {
            .form-card { padding: 2.5rem 1.5rem; }
            .header h1 { font-size: 1.8rem; }
            .team-member-box { padding: 1.5rem 1rem 0.5rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <div class="header">
            <h1>Event Registration</h1>
            <p>Secure your team's spot today.</p>
        </div>

        <div class="glass form-card">
            <form id="modernForm">
                
                <div class="input-box">
                    <i class="fa-solid fa-user-shield"></i>
                    <input type="text" id="volunteerName" name="volunteerName" required autocomplete="off" placeholder=" ">
                    <label for="volunteerName">Volunteer Name</label>
                </div>
                
                <div class="input-box">
                    <i class="fa-solid fa-users"></i>
                    <select id="teamSize" name="teamSize" onchange="generateTeamFields()" required>
                        <option value="" hidden></option> 
                        <option value="2">2 Members</option>
                        <option value="3">3 Members</option>
                        <option value="4">4 Members</option>
                        <option value="5">5 Members</option>
                    </select>
                    <label for="teamSize">Total Team Size</label>
                </div>

                <div id="dynamicMembersContainer"></div>

                <button type="submit" id="submitBtn">Submit Registration <i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeBtn = document.getElementById('themeBtn');
        const body = document.body;
        const themeIcon = themeBtn.querySelector('i');

        const currentTheme = localStorage.getItem('theme') || 'dark';
        body.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeBtn.addEventListener('click', () => {
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            if (theme === 'light') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        // --- OPTIMIZED FORM LOGIC ---
        function generateTeamFields() {
            const teamSizeInput = document.getElementById("teamSize").value;
            const teamSize = teamSizeInput === "" ? 0 : parseInt(teamSizeInput);
            const container = document.getElementById("dynamicMembersContainer");
            const currentCount = container.children.length;

            if (teamSize > currentCount) {
                let animationDelayIndex = 0;
                for (let i = currentCount + 1; i <= teamSize; i++) {
                    const memberDiv = document.createElement("div");
                    memberDiv.className = "team-member-box";
                    memberDiv.style.animationDelay = `${animationDelayIndex * 0.1}s`;
                    animationDelayIndex++;
                    
                    memberDiv.innerHTML = `
                        <h4><i class="fa-solid fa-user-plus"></i> Team Member ${i}</h4>
                        
                        <div class="input-box">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="member${i}Name" name="member${i}Name" required autocomplete="off" placeholder=" ">
                            <label for="member${i}Name">Full Name</label>
                        </div>
                        
                        <div class="input-box">
                            <i class="fa-solid fa-id-card"></i>
                            <input type="text" id="member${i}Roll" name="member${i}Roll" required autocomplete="off" placeholder=" ">
                            <label for="member${i}Roll">Roll Number</label>
                        </div>
                        
                        <div class="input-box">
                            <i class="fa-solid fa-building-columns"></i>
                            <input type="text" id="member${i}Branch" name="member${i}Branch" autocomplete="off" placeholder=" ">
                            <label for="member${i}Branch">Branch</label>
                        </div>
                        
                        <div class="input-box">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="member${i}Contact" name="member${i}Contact" autocomplete="off" placeholder=" ">
                            <label for="member${i}Contact">Contact No </label>
                        </div>
                    `;
                    container.appendChild(memberDiv);
                }
            } 
            else if (teamSize < currentCount) {
                for (let i = currentCount; i > teamSize; i--) {
                    container.removeChild(container.lastElementChild);
                }
            }
        }

        // YOUR UNIQUE GOOGLE APPS SCRIPT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw1nAkixjBsjFH-i8jJoYU7C-1jpe6PCn5r4QRE-WIAPQJkvqPAhrGIpyF4NhwsEzFw1g/exec';
        
        const form = document.getElementById('modernForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const originalBtnContent = btn.innerHTML;
            btn.innerHTML = 'Sending... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
            .then(response => {
                btn.innerHTML = 'Registered! <i class="fa-solid fa-check-circle"></i>';
                btn.style.background = 'var(--success-color)';
                btn.style.color = '#111827';
                
                setTimeout(() => {
                    btn.innerHTML = originalBtnContent;
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.disabled = false;
                    
                    form.reset();
                    document.getElementById('dynamicMembersContainer').innerHTML = '';
                }, 3000);
            })
            .catch(error => {
                btn.innerHTML = 'Error! <i class="fa-solid fa-triangle-exclamation"></i>';
                btn.style.background = 'var(--error-color)'; 
                btn.style.color = '#fff';
                console.error('Submission Error:', error);
                
                setTimeout(() => {
                    btn.innerHTML = originalBtnContent;
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.disabled = false;
                }, 3000);
            });
        });
    </script>
</body>
</html>
